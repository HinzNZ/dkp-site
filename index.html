<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUCKLAND TRANSPORT · 公会DKP管理</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#c9a84c;--gold-light:#f0d080;--gold-dark:#8a6a1e;
  --bg:#0a0c10;--bg-card:#111420;--bg-card2:#161b2a;
  --border:rgba(201,168,76,0.2);--border-hi:rgba(201,168,76,0.55);
  --text:#e8dfc8;--muted:#8a8070;
  --red:#d05050;--green:#4aaa80;--blue:#4a9fe0;--purple:#a06ee0;
  --shadow:0 8px 40px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 10%,rgba(201,168,76,.05) 0%,transparent 70%),radial-gradient(ellipse 50% 50% at 85% 85%,rgba(60,80,200,.05) 0%,transparent 70%);pointer-events:none;z-index:0}

.hdr{position:sticky;top:0;z-index:200;background:rgba(10,12,16,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 28px}
.hdr-in{max-width:1500px;margin:0 auto;display:flex;align-items:center;gap:16px;height:60px}
.logo .en{font-family:'Cinzel',serif;font-size:14px;font-weight:900;color:var(--gold);letter-spacing:3px}
.logo .cn{font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:2px}
.nav{display:flex;gap:2px;margin-left:auto}
.nb{background:none;border:1px solid transparent;color:var(--muted);font-family:'Noto Sans SC',sans-serif;font-size:13px;padding:6px 16px;border-radius:7px;cursor:pointer;transition:.18s;display:flex;align-items:center;gap:7px}
.nb:hover,.nb.on{color:var(--gold);border-color:var(--border);background:rgba(201,168,76,.06)}

.app{max-width:1500px;margin:0 auto;padding:20px 28px;position:relative;z-index:1}
.pg{display:none}.pg.on{display:block}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:13px;font-weight:500;transition:.18s;white-space:nowrap}
.btn-gold{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:#0a0c10;font-weight:700}
.btn-gold:hover{opacity:.88;transform:translateY(-1px)}
.btn-outline{background:none;border:1px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-green{background:rgba(74,170,128,.15);border:1px solid rgba(74,170,128,.4);color:var(--green)}
.btn-green:hover{background:rgba(74,170,128,.25)}
.btn-red{background:rgba(208,80,80,.15);border:1px solid rgba(208,80,80,.4);color:var(--red)}
.btn-blue{background:rgba(74,159,224,.15);border:1px solid rgba(74,159,224,.4);color:var(--blue)}
.btn-sm{padding:5px 12px;font-size:12px}

.badge{font-size:10px;padding:2px 8px;border-radius:99px;border:1px solid}
.b-gold{color:var(--gold);border-color:var(--gold-dark)}
.b-green{color:var(--green);border-color:rgba(74,170,128,.4)}
.b-blue{color:var(--blue);border-color:rgba(74,159,224,.4)}
.b-red{color:var(--red);border-color:rgba(208,80,80,.4)}
.b-muted{color:var(--muted);border-color:rgba(138,128,112,.3)}

.stitle{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;color:var(--muted);letter-spacing:1px}
.fi,.fs{background:var(--bg-card2);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:13px;padding:8px 12px;border-radius:7px;outline:none;transition:.18s;width:100%}
.fi:focus,.fs:focus{border-color:var(--gold)}
.fs option{background:var(--bg-card2)}

/* ── CALENDAR ── */
.cal-page{display:grid;grid-template-columns:190px 1fr;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;overflow:hidden;min-height:580px}
.cal-sidebar{border-right:1px solid var(--border);padding:18px 12px;background:rgba(6,8,14,.5)}
.mini-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mini-month{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--gold)}
.mnav{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 5px;border-radius:4px;transition:.12s}
.mnav:hover{color:var(--gold)}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:14px}
.mini-dow{text-align:center;font-size:9px;color:var(--muted);padding:3px 0}
.mday{text-align:center;font-size:11px;padding:3px 1px;border-radius:50%;cursor:pointer;transition:.12s;color:rgba(138,128,112,.6);width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:1px auto;position:relative}
.mday:hover{background:rgba(201,168,76,.1);color:var(--text)}
.mday.cur{color:var(--text)}
.mday.tod{background:var(--gold);color:#0a0c10;font-weight:700}
.mday.hev::after{content:'';position:absolute;bottom:1px;width:3px;height:3px;background:var(--gold);border-radius:50%}
.mday.tod.hev::after{background:#0a0c10}

.cal-main{display:flex;flex-direction:column;overflow:hidden}
.cal-top{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.cal-period{font-family:'Cinzel',serif;font-size:15px;color:var(--text)}
.vbtns{display:flex;gap:3px;margin-left:auto}
.vb{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:.12s}
.vb.on,.vb:hover{color:var(--gold);border-color:var(--border-hi)}
.cnav{background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;transition:.12s;display:flex;align-items:center;justify-content:center}
.cnav:hover{color:var(--gold);border-color:var(--gold)}

/* Month grid */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;overflow-y:auto}
.mg-dow{padding:8px;text-align:center;font-size:10px;color:var(--muted);letter-spacing:1px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.mg-cell{border-right:1px solid var(--border);border-bottom:1px solid rgba(201,168,76,.1);padding:5px 7px;min-height:100px;vertical-align:top}
.mg-cell.dim .mg-dn{color:rgba(138,128,112,.35)}
.mg-dn{font-size:12px;color:var(--muted);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:4px}
.mg-dn.tod{background:var(--gold);color:#0a0c10;font-weight:700}
.evts{display:flex;flex-direction:column;gap:2px}

/* Week grid */
.week-grid{display:grid;grid-template-columns:46px repeat(7,1fr);overflow-y:auto;flex:1}
.wg-c{border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.wg-dh{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px 4px;text-align:center}
.wg-dh .wd{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.wg-dh .wdn{font-size:17px;font-weight:300;color:var(--text);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:3px auto 0}
.wg-dh .wdn.tod{background:var(--gold);color:#0a0c10;font-weight:700}
.wg-t{border-right:1px solid var(--border);border-bottom:1px solid rgba(201,168,76,.07);padding:3px 5px;text-align:right;font-size:10px;color:var(--muted);height:48px}
.wg-cell{border-right:1px solid var(--border);border-bottom:1px solid rgba(201,168,76,.07);height:48px;position:relative}

/* Event pills */
.epill{border-radius:4px;padding:3px 7px;font-size:11px;cursor:pointer;transition:.15s;border-left:3px solid;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.epill:hover{filter:brightness(1.2)}
.ep-planned{background:rgba(74,159,224,.13);border-color:var(--blue);color:var(--blue)}
.ep-active{background:rgba(74,170,128,.13);border-color:var(--green);color:var(--green)}
.ep-completed{background:rgba(201,168,76,.1);border-color:var(--gold);color:var(--gold-light)}

/* ── EVENT DETAIL ── */
.ed-page{display:none}.ed-page.on{display:block}
.ed-back{background:none;border:none;color:var(--muted);font-family:'Noto Sans SC',sans-serif;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;padding:6px 0;margin-bottom:16px;transition:.15s}
.ed-back:hover{color:var(--gold)}
.ed-hero{background:var(--bg-card);border:1px solid var(--border-hi);border-radius:14px;padding:24px 28px;margin-bottom:16px}
.ed-title{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:8px}
.ed-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ed-acts{display:flex;gap:8px;flex-wrap:wrap}
.ed-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.eds{background:var(--bg-card2);border:1px solid var(--border);border-radius:9px;padding:12px;text-align:center}
.eds-l{font-size:10px;color:var(--muted);margin-bottom:4px;letter-spacing:1px}
.eds-v{font-family:'Cinzel',serif;font-size:20px;font-weight:600}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Noto Sans SC',sans-serif;font-size:13px;padding:10px 20px;cursor:pointer;transition:.15s;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.tpanel{display:none}.tpanel.on{display:block}

.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px}
.rcard{background:var(--bg-card2);border:1px solid var(--border);border-radius:9px;padding:11px 13px;position:relative;transition:.15s}
.rcard:hover{border-color:var(--border-hi)}
.rc-name{font-size:13px;font-weight:600;margin-bottom:2px}
.rc-sub{font-size:11px;color:var(--muted)}
.rc-dkp{position:absolute;right:11px;top:11px;font-size:12px;font-weight:700;color:var(--gold)}
.rt-t{border-left:3px solid #6699ff}
.rt-n{border-left:3px solid #44bb77}
.rt-d{border-left:3px solid #dd5555}

.lrow{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-card2);border:1px solid var(--border);border-radius:8px;font-size:12px;margin-bottom:5px}
.lt{color:var(--muted);min-width:42px}
.lw{font-weight:600;min-width:85px}
.li{flex:1}
.la{font-weight:700;min-width:55px;text-align:right}
.q-epic{color:#a335ee}.q-hero{color:#0070dd}.q-normal{color:#1eff00}

/* ── MEMBERS / DKP ── */
.tb-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:rgba(201,168,76,.06);padding:10px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px;border-bottom:1px solid var(--border)}
td{padding:10px 16px;font-size:13px;border-bottom:1px solid rgba(201,168,76,.07)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(201,168,76,.025)}
.dv{font-weight:700;color:var(--gold)}.dv-{font-weight:700;color:var(--red)}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px}
.sc-l{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.sc-v{font-family:'Cinzel',serif;font-size:26px;font-weight:600;color:var(--gold)}
.sc-s{font-size:11px;color:var(--muted);margin-top:2px}

/* ── GEAR ── */
.gear-layout{display:grid;grid-template-columns:1fr 330px;gap:16px}
.gc{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:18px}

/* ── MODALS ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.mo.on{display:flex}
.md{background:var(--bg-card);border:1px solid var(--border-hi);border-radius:14px;padding:26px;width:580px;max-width:95vw;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow)}
.md-title{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);margin-bottom:18px}
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.md-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:14px;border-top:1px solid var(--border)}
.pbs{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.pb{background:var(--bg-card2);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-family:'Noto Sans SC',sans-serif;transition:.14s}
.pb:hover,.pb.on{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}
.mpk{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:5px;max-height:260px;overflow-y:auto;padding:2px}
.pcard{background:var(--bg-card2);border:1px solid var(--border);border-radius:7px;padding:8px;cursor:pointer;transition:.13s;text-align:center}
.pcard:hover{border-color:var(--gold);background:rgba(201,168,76,.07)}
.pcard.on{border-color:var(--gold);background:rgba(201,168,76,.14)}
.pc-n{font-size:12px;color:var(--text)}
.pc-d{font-size:10px;color:var(--muted);margin-top:1px}
.rtag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:99px}
.rt-t2{background:rgba(68,102,255,.18);color:#99aaff;border:1px solid rgba(68,102,255,.35)}
.rt-n2{background:rgba(68,200,100,.18);color:#88ddaa;border:1px solid rgba(68,200,100,.35)}
.rt-d2{background:rgba(220,60,60,.18);color:#ffaaaa;border:1px solid rgba(220,60,60,.35)}

.tw{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--bg-card);border:1px solid var(--border-hi);color:var(--text);font-size:13px;padding:10px 16px;border-radius:8px;box-shadow:var(--shadow);transform:translateX(120%);transition:.26s;pointer-events:auto}
.toast.show{transform:translateX(0)}
.toast.ok{border-color:rgba(74,170,128,.6);color:var(--green)}
.toast.err{border-color:rgba(208,80,80,.6);color:var(--red)}

.gear-type-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;transition:.2s}
.gear-type-card:hover{border-color:var(--border-hi)}
.gtc-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.gtc-icon{width:44px;height:44px;border-radius:8px;object-fit:cover;border:1px solid var(--border);background:var(--bg-card2);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;overflow:hidden;flex-shrink:0}
.gtc-icon img{width:100%;height:100%;object-fit:cover}
.gtc-name-input{background:none;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:14px;font-weight:600;font-family:'Noto Sans SC',sans-serif;width:100%;outline:none;padding:2px 0;transition:.15s}
.gtc-name-input:focus{border-bottom-color:var(--gold)}
.gtc-prices{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.gtc-price-cell{display:flex;flex-direction:column;gap:3px}
.gtc-price-label{font-size:9px;letter-spacing:1px;text-transform:uppercase}
.gtc-price-input{background:var(--bg-card2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:13px;font-weight:600;text-align:center;padding:5px 4px;width:100%;outline:none;font-family:'Noto Sans SC',sans-serif;transition:.15s}
.gtc-price-input:focus{border-color:var(--gold)}
.gtc-del{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;opacity:0;transition:.15s;line-height:1}
.gear-type-card:hover .gtc-del{opacity:1}
.gtc-del:hover{color:var(--red)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,.22);border-radius:3px}

@media(max-width:900px){
  .cal-page{grid-template-columns:1fr}.cal-sidebar{display:none}
  .stats-row{grid-template-columns:1fr 1fr}
  .gear-layout{grid-template-columns:1fr}
  .ed-stats{grid-template-columns:1fr 1fr 1fr}
}

/* ── LOGIN OVERLAY ── */
.login-overlay{position:fixed;inset:0;background:rgba(6,8,14,.97);z-index:9000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.login-box{background:var(--bg-card);border:1px solid var(--border-hi);border-radius:16px;padding:40px 44px;width:360px;box-shadow:var(--shadow);text-align:center}
.login-logo{font-family:'Cinzel',serif;font-size:16px;font-weight:900;color:var(--gold);letter-spacing:3px;margin-bottom:4px}
.login-sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:32px}
.login-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:24px}
.ltab{flex:1;background:none;border:none;color:var(--muted);font-family:'Noto Sans SC',sans-serif;font-size:13px;padding:9px;cursor:pointer;transition:.15s}
.ltab.on{background:rgba(201,168,76,.12);color:var(--gold)}
.login-field{margin-bottom:14px;text-align:left}
.login-field label{font-size:11px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:5px}
.login-err{color:var(--red);font-size:12px;margin-bottom:10px;min-height:18px}
.admin-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(201,168,76,.12);border:1px solid var(--gold-dark);color:var(--gold);font-size:11px;padding:3px 10px;border-radius:99px;cursor:pointer;transition:.15s}
.admin-badge:hover{background:rgba(201,168,76,.2)}
.viewer-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(138,128,112,.1);border:1px solid rgba(138,128,112,.3);color:var(--muted);font-size:11px;padding:3px 10px;border-radius:99px;cursor:pointer;transition:.15s}
.viewer-badge:hover{background:rgba(138,128,112,.18)}
/* hide admin controls when viewer */
body.viewer-mode .admin-only{display:none!important}
/* change pw modal */
</style>
</head>
<body>

// ══ CALENDAR INIT ══
function initCal(){
  const n=new Date();calY=n.getFullYear();calM=n.getMonth();
  mainY=calY;mainM=calM;weekStart=weekOf(n);renderAll();
}
function weekOf(d){const r=new Date(d);r.setHours(0,0,0,0);r.setDate(r.getDate()-r.getDay());return r;}
function sideNav(d){calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderSide();}
function mainNav(d){
  if(calView==='month'){mainM+=d;if(mainM<0){mainM=11;mainY--;}if(mainM>11){mainM=0;mainY++;}calY=mainY;calM=mainM;}
  else{weekStart=new Date(weekStart);weekStart.setDate(weekStart.getDate()+d*7);mainY=weekStart.getFullYear();mainM=weekStart.getMonth();calY=mainY;calM=mainM;}
  renderAll();
}
function setView(v){calView=v;document.getElementById('vb-month').classList.toggle('on',v==='month');document.getElementById('vb-week').classList.toggle('on',v==='week');renderAll();}
function renderAll(){renderSide();calView==='month'?renderMonth():renderWeek();}

function renderSide(){
  const mos=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('side-label').textContent=`${calY}·${mos[calM]}`;
  const evtDs=new Set(events.map(e=>e.date));
  const now=new Date(),first=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate();
  const dows=['日','一','二','三','四','五','六'];
  let h=dows.map(d=>`<div class="mini-dow">${d}</div>`).join('');
  for(let i=0;i<first;i++)h+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const ds=ds_(calY,calM+1,d);
    const t=now.getFullYear()===calY&&now.getMonth()===calM&&now.getDate()===d;
    const he=evtDs.has(ds);
    h+=`<div class="mday${t?' tod':''}${he?' hev':''}${' cur'}" onclick="sideClick('${ds}')">${d}</div>`;
  }
  document.getElementById('side-grid').innerHTML=h;
}

function sideClick(ds){
  const ev=events.filter(e=>e.date===ds);
  if(ev.length)openEvtDetail(ev[0].id);
  else{const d=new Date(ds);mainY=d.getFullYear();mainM=d.getMonth();if(calView==='week')weekStart=weekOf(d);renderAll();}
}

function renderMonth(){
  const mos=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('cal-big-title').textContent=`${mainY} 年 ${mos[mainM]}`;
  document.getElementById('main-label').textContent=`${mainY} 年 ${mos[mainM]}`;
  const now=new Date(),first=new Date(mainY,mainM,1).getDay(),days=new Date(mainY,mainM+1,0).getDate();
  const dows=['周日','周一','周二','周三','周四','周五','周六'];
  let h=`<div class="month-grid">`;
  dows.forEach(d=>h+=`<div class="mg-dow">${d}</div>`);
  const prev=new Date(mainY,mainM,0).getDate();
  for(let i=0;i<first;i++){
    const d=prev-first+1+i;
    const ds=ds_(mainM===0?mainY-1:mainY,mainM===0?12:mainM,d);
    h+=`<div class="mg-cell dim"><div class="mg-dn">${d}</div><div class="evts">${pills(ds)}</div></div>`;
  }
  for(let d=1;d<=days;d++){
    const ds=ds_(mainY,mainM+1,d);
    const t=now.getFullYear()===mainY&&now.getMonth()===mainM&&now.getDate()===d;
    h+=`<div class="mg-cell"><div class="mg-dn${t?' tod':''}">${d}</div><div class="evts">${pills(ds)}</div></div>`;
  }
  const rem=(first+days)%7;if(rem>0)for(let d=1;d<=7-rem;d++){
    const ds=ds_(mainM===11?mainY+1:mainY,mainM===11?1:mainM+2,d);
    h+=`<div class="mg-cell dim"><div class="mg-dn">${d}</div><div class="evts">${pills(ds)}</div></div>`;
  }
  h+=`</div>`;
  document.getElementById('main-body').innerHTML=h;
}

function renderWeek(){
  const mos=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const ws=new Date(weekStart),we=new Date(ws);we.setDate(we.getDate()+6);
  document.getElementById('cal-big-title').textContent=`${mainY} 年 ${mos[mainM]}`;
  document.getElementById('main-label').textContent=`${ws.getMonth()+1}月${ws.getDate()}日 – ${we.getMonth()+1}月${we.getDate()}日`;
  const now=new Date(),dows=['周日','周一','周二','周三','周四','周五','周六'];
  const days=[];for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);days.push(d);}
  let h=`<div class="week-grid"><div class="wg-c"></div>`;
  days.forEach((d,i)=>{
    const t=d.toDateString()===now.toDateString();
    h+=`<div class="wg-dh"><div class="wd">${dows[i]}</div><div class="wdn${t?' tod':''}">${d.getDate()}</div></div>`;
  });
  for(let hr=18;hr<=24;hr++){
    h+=`<div class="wg-t">${hr===24?'00:00':hr+':00'}</div>`;
    days.forEach(d=>{
      const ds=ds_(d.getFullYear(),d.getMonth()+1,d.getDate());
      const evHr=events.filter(e=>e.date===ds&&parseInt(e.time)===hr%24);
      h+=`<div class="wg-cell">${evHr.map(e=>`<div class="epill ep-${e.status}" style="position:absolute;inset:2px;font-size:11px" onclick="openEvtDetail(${e.id})">${e.name}</div>`).join('')}</div>`;
    });
  }
  h+=`</div>`;
  document.getElementById('main-body').innerHTML=h;
}

function pills(ds){return events.filter(e=>e.date===ds).map(e=>`<div class="epill ep-${e.status}" onclick="openEvtDetail(${e.id})">${e.time} ${e.name}</div>`).join('');}
function ds_(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

    } else {
      const names=(l.members||[]).map(mid=>{const mm=members.find(x=>x.id===mid);return mm?mm.char||mm.wx:'?';});
      const coloredNames=(l.members||[]).map(mid=>{const mm=members.find(x=>x.id===mid);return mm?`<span style="color:${clsColor(mm.cls)}">${mm.char||mm.wx}</span>`:'?';});

  const lRows=e.lootLog.map(l=>{const m=members.find(x=>x.id===l.mid);return`<div class="lrow"><span class="lt">${l.time}</span><span class="lw" style="color:${m?clsColor(m.cls):'var(--muted)'}">${m?m.char||m.wx:'?'}</span><span class="li q-${l.q}">${l.item}</span><span class="la" style="color:var(--red)">-${l.dkp}</span></div>`;}).join('');
  const totDkp=e.dkpLog.reduce((a,l)=>a+l.amount,0);

  document.getElementById('ed-inner').innerHTML=`
  <div class="ed-hero">
    <div class="ed-top">
      <div>
        <div class="ed-title">${e.name}</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:8px">
          <span class="badge b-gold">${e.raid}</span>
          <span class="badge ${e.status==='completed'?'b-green':e.status==='active'?'b-blue':'b-muted'}">${{completed:'已完成',active:'进行中',planned:'计划中'}[e.status]}</span>
          <span class="badge b-muted">${e.date} ${e.time}</span>
          <span class="badge b-muted">${ms.length} 人</span>
        </div>
      </div>
      <div class="ed-acts">
        <button class="btn btn-green btn-sm admin-only" onclick="openDkpMo(${id})">⚡ 一键加DKP</button>
        <button class="btn btn-blue btn-sm admin-only" onclick="openLootMo(${id})">🎁 分配装备</button>

    <div class="ed-stats">
      <div class="eds"><div class="eds-l">本次加分</div><div class="eds-v" style="color:var(--green)">+${totDkp}</div></div>

      <div class="eds"><div class="eds-l">出席人数</div><div class="eds-v" style="color:var(--gold)">${ms.length}</div></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="swTab('roster',this)">出席团员 (${ms.length})</button>
    <button class="tab" onclick="swTab('dkplog',this)">DKP记录 (${e.dkpLog.length})</button>
    <button class="tab" onclick="swTab('lootlog',this)">装备记录 (${e.lootLog.length})</button>
  </div>
  <div class="tpanel on" id="tp-roster">
    <div style="margin-bottom:14px">
      <button class="btn btn-gold btn-sm admin-only" onclick="openAddRosterMo(${id})">＋ 添加团员到本次活动</button>
    </div>
    ${sect('坦克',tanks)}${sect('治疗',heals)}${sect('输出',dps)}

function swTab(name,el){
  el.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  ['roster','dkplog','lootlog'].forEach(n=>document.getElementById('tp-'+n)?.classList.remove('on'));
  document.getElementById('tp-'+name).classList.add('on');
}
function toggleStatus(id){
  const e=events.find(x=>x.id===id);
  e.status=e.status==='completed'?'planned':'completed';
  if(e.db_id) db.updateEventStatus(e.db_id, e.status);
  renderED(id);renderAll();toast(e.status==='completed'?'已标记完成':'已重新开放','ok');
}

// ══ MODALS ══
function openMo(id){document.getElementById(id).classList.add('on');}
function closeMo(id){document.getElementById(id).classList.remove('on');}

function openNewEvtMo(){
  document.getElementById('e-date').value=new Date().toISOString().slice(0,10);
  ['e-name','e-note','e-raid-custom'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('e-raid-base').value='虚影尖塔';
  document.getElementById('e-raid-diff').value='普通';
  document.getElementById('e-raid-custom').style.display='none';
  openMo('mo-evt');
}
function onRaidBaseChange(){
  const v=gv('e-raid-base');
  const custom=document.getElementById('e-raid-custom');
  const diff=document.getElementById('e-raid-diff');
  if(v==='__custom__'){
    custom.style.display='';custom.focus();
    diff.style.display='none';
  } else {
    custom.style.display='none';custom.value='';
    diff.style.display='';
  }
}
function saveEvt(){
  const name=gv('e-name').trim(),date=gv('e-date');
  if(!name||!date){toast('请填写名称和日期','err');return;}
  const raidBase=gv('e-raid-base');
  const raidDiff=gv('e-raid-diff');
  const raidCustom=(document.getElementById('e-raid-custom').value||'').trim();
  if(raidBase==='__custom__'&&!raidCustom){toast('请填写自定义副本名称','err');return;}
  const raid=raidBase==='__custom__'?raidCustom:`${raidBase}（${raidDiff}）`;
  const ev={id:uid++,name,date,time:gv('e-time'),raid,note:gv('e-note'),status:'planned',
    roster:members.filter(m=>m.st==='在').map(m=>m.id),dkpLog:[],lootLog:[]};
  events.push(ev);
  // Save to DB
  db.insertEvent(ev); // sets ev.db_id on success
  closeMo('mo-evt');renderAll();openEvtDetail(ev.id);toast('活动已创建','ok');
}

function openDkpMo(id){
  dkpEvtId=id;dkpSc='all';dkpSel=[];
  sv('dkp-amt',10);sv('dkp-note','');
  document.getElementById('dkp-sel').style.display='none';
  document.getElementById('sc-all').classList.add('on');document.getElementById('sc-sel').classList.remove('on');
  document.querySelectorAll('#mo-dkp .pb').forEach(b=>b.classList.remove('on'));
  const e=events.find(x=>x.id===id);
  const ms=(e?e.roster:[]).map(i=>members.find(m=>m.id===i)).filter(Boolean);
  document.getElementById('dkp-pk').innerHTML=ms.map(m=>`<div class="pcard" id="dp-${m.id}" onclick="togDkp(${m.id})"><div class="pc-n" style="color:${clsColor(m.cls)};font-weight:600">${m.char||m.wx}</div><div class="pc-d" style="color:${clsColor(m.cls)}66;font-size:10px">${m.cls} · ${m.dkp} DKP</div></div>`).join('');
  openMo('mo-dkp');
}
function pickPhase(name,amt,el){document.querySelectorAll('#mo-dkp .pbs .pb').forEach(b=>b.classList.remove('on'));el.classList.add('on');sv('dkp-amt',amt);sv('dkp-note',name);}
function setSc(s,el){dkpSc=s;document.getElementById('sc-all').classList.toggle('on',s==='all');document.getElementById('sc-sel').classList.toggle('on',s==='sel');document.getElementById('dkp-sel').style.display=s==='sel'?'block':'none';}
function togDkp(id){const el=document.getElementById(`dp-${id}`);if(dkpSel.includes(id)){dkpSel=dkpSel.filter(x=>x!==id);el.classList.remove('on');}else{dkpSel.push(id);el.classList.add('on');}}
function confirmDkp(){
  const amt=parseInt(gv('dkp-amt'))||0,note=gv('dkp-note');
  const e=events.find(x=>x.id===dkpEvtId);if(!e)return;
  const tgts=dkpSc==='all'?e.roster:dkpSel;
  tgts.forEach(id=>{const m=members.find(x=>x.id===id);if(m){m.dkp+=amt;if(m.db_id)db.updateMemberDkp(m.db_id,m.dkp);}});
  const dlog={type:note||'加分',amount:amt,scope:dkpSc,members:dkpSc==='sel'?[...dkpSel]:[],note,time:nowT()};
  e.dkpLog.push(dlog);
  if(e.db_id) db.insertDkpLog(e.db_id, dlog);
  closeMo('mo-dkp');renderED(dkpEvtId);toast(`已为 ${tgts.length} 人加 ${amt} DKP ✨`,'ok');
}

function renderLootTypeGrid(q) {
  const filtered = q
    ? gearTypes.filter(g => g.name.toLowerCase().includes(q.toLowerCase()))
    : gearTypes;
  const qColor = {normal:'#1eff00', hero:'#0070dd', epic:'#a335ee'};
  document.getElementById('l-type-grid').innerHTML = filtered.map(g => {
    const iconHtml = g.icon
      ? `<img src="${g.icon}" style="width:32px;height:32px;object-fit:cover;border-radius:6px">`
      : `<span style="font-size:22px">${g.emoji||'🗡️'}</span>`;
    return `<div onclick="selectLootType(${g.id})"
      style="background:var(--bg-card2);border:1px solid var(--border);border-radius:9px;padding:12px 10px;cursor:pointer;text-align:center;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:6px"
      onmouseover="this.style.borderColor='var(--gold)';this.style.background='rgba(200,168,75,.08)'"
      onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--bg-card2)'">
      ${iconHtml}
      <div style="font-size:12px;font-weight:600;color:var(--text)">${g.name}</div>
      <div style="font-size:10px;display:flex;gap:4px">
        <span style="color:${qColor.normal}">${g.n}</span>
        <span style="color:var(--muted)">/</span>
        <span style="color:${qColor.hero}">${g.h}</span>
        <span style="color:var(--muted)">/</span>
        <span style="color:${qColor.epic}">${g.e}</span>
      </div>
    </div>`;
  }).join('') || '<div style="color:var(--muted);padding:20px;text-align:center;grid-column:1/-1">暂无装备类型</div>';
}

function selectLootType(gearTypeId) {
  const g = gearTypes.find(x => x.id === gearTypeId);
  if (!g) return;
  lootSelGearType = g;
  document.getElementById('loot-step1').style.display = 'none';
  document.getElementById('loot-step2').style.display = 'block';
  document.getElementById('l-confirm-btn').style.display = '';
  const iconEl = document.getElementById('l-selected-icon');
  iconEl.innerHTML = g.icon
    ? `<img src="${g.icon}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`
    : (g.emoji || '🗡️');
  document.getElementById('l-selected-name').textContent = g.name;
  selectLootQual('normal', document.querySelector('.loot-qual-btn[data-qual="normal"]'));
}

function lootBackToStep1() {
  const s1=document.getElementById('loot-step1');
  const s2=document.getElementById('loot-step2');

async function sbFetch(path, method='GET', body=null, prefer='return=representation') {
  const headers = {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json',
    'Prefer': prefer,
  };
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(SB_URL + '/rest/v1/' + path, opts);
    if (!res.ok) {
      const err = await res.text();
      console.error('SB error', method, path, err);
      toast('数据库操作失败: ' + err.slice(0,80), 'err');
      return null;
    }
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  } catch(e) {
    console.error('SB fetch exception:', e);
    toast('网络错误，请检查连接', 'err');
    return null;
  }
}

const db = {
  // ── Members ──
  async getMembers() {
    return await sbFetch('members?select=*&order=id') || [];
  },
  async upsertMember(m) {
    // Never send local id - let DB auto-assign, use db_id for updates
    const row = { wx: m.wx, bn: m.bn||'', char_name: m.char||'', cls: m.cls||'', role: m.role||'DPS', status: m.st||'在', dkp: m.dkp||0, note: m.note||'' };
    if (m.db_id) {
      // UPDATE existing
      return await sbFetch(`members?id=eq.${m.db_id}`, 'PATCH', row, 'return=representation');
    } else {
      // INSERT new
      const res = await sbFetch('members', 'POST', row, 'return=representation');
      if (res && res[0]) { m.db_id = res[0].id; return res[0]; }
      return null;
    }
  },
  async updateMemberDkp(id, dkp) {
    // id here is db_id
    return await sbFetch(`members?id=eq.${id}`, 'PATCH', { dkp }, 'return=minimal');
  },

  // ── Events ──
  async getEvents() {
    return await sbFetch('events?select=*&order=date.desc,created_at.desc') || [];
  },
  async insertEvent(ev) {
    const row = { name: ev.name, date: ev.date, time: ev.time||'20:00', raid: ev.raid||'', note: ev.note||'', status: ev.status||'planned', roster: ev.roster||[] };
    const res = await sbFetch('events', 'POST', row, 'return=representation');
    if (res && res[0]) { ev.db_id = res[0].id; return res[0]; }
    return null;
  },
  async updateEventStatus(dbId, status) {
    return await sbFetch(`events?id=eq.${dbId}`, 'PATCH', { status }, 'return=minimal');
  },
  async updateEventRoster(dbId, roster) {
    return await sbFetch(`events?id=eq.${dbId}`, 'PATCH', { roster }, 'return=minimal');
  },

  // ── DKP Logs ──
  async getDkpLogs(eventDbId) {
    return await sbFetch(`dkp_logs?event_id=eq.${eventDbId}&select=*&order=created_at`) || [];
  },
  async insertDkpLog(eventDbId, log) {
    const row = { event_id: eventDbId, type: log.type||'', amount: log.amount||0, scope: log.scope||'all', members: log.members||[], note: log.note||'', log_time: log.time||'' };
    return await sbFetch('dkp_logs', 'POST', row, 'return=minimal');
  },

  // ── Loot Logs ──
  async getLootLogs(eventDbId) {
    return await sbFetch(`loot_logs?event_id=eq.${eventDbId}&select=*&order=created_at`) || [];
  },
  async insertLootLog(eventDbId, log) {
    const row = { event_id: eventDbId, member_id: log.member_db_id||null, item: log.item||'', quality: log.q||'normal', dkp: log.dkp||0, log_time: log.time||'' };
    return await sbFetch('loot_logs', 'POST', row, 'return=minimal');
  },

  // ── Gear Types ──
  async getGearTypes() {
    return await sbFetch('gear_types?select=*&order=sort_order,id') || [];
  },
  async insertGearType(g) {
    const row = { name: g.name, price_normal: g.n||0, price_hero: g.h||0, price_epic: g.e||0, icon_url: g.icon||null, emoji: g.emoji||'🗡️', sort_order: g.sort_order||0 };
    const res = await sbFetch('gear_types', 'POST', row, 'return=representation');
    if (res && res[0]) { g.db_id = res[0].id; return res[0]; }
    return null;
  },
  async updateGearType(g) {
    const row = { name: g.name, price_normal: g.n||0, price_hero: g.h||0, price_epic: g.e||0, icon_url: g.icon||null, emoji: g.emoji||'🗡️' };
    return await sbFetch(`gear_types?id=eq.${g.db_id}`, 'PATCH', row, 'return=minimal');
  },
  async deleteGearType(dbId) {
    return await sbFetch(`gear_types?id=eq.${dbId}`, 'DELETE', null, 'return=minimal');
  },
};

// ── Map DB rows → local format ──
function rowToMember(r) {
  return { id: r.id, db_id: r.id, wx: r.wx||'', bn: r.bn||'', char: r.char_name||'', cls: r.cls||'', role: r.role||'DPS', st: r.status||'在', dkp: r.dkp||0, note: r.note||'' };
}
function rowToEvent(r) {
  return { id: r.id, db_id: r.id, name: r.name, date: r.date, time: r.time||'20:00', raid: r.raid||'', note: r.note||'', status: r.status||'planned', roster: r.roster||[], dkpLog:[], lootLog:[] };
}
function rowToDkpLog(r) {
  return { type: r.type, amount: r.amount, scope: r.scope, members: r.members||[], note: r.note||'', time: r.log_time||'' };
}
function rowToLootLog(r) {
  return { mid: r.member_id, item: r.item, q: r.quality, dkp: r.dkp, time: r.log_time||'' };
}
function rowToGearType(r) {
  return { id: r.id, db_id: r.id, name: r.name, n: r.price_normal, h: r.price_hero, e: r.price_epic, icon: r.icon_url||null, emoji: r.emoji||'🗡️', sort_order: r.sort_order||0 };
}

// ── Bootstrap: load everything from DB on page load ──
async function loadAllFromDB() {
  showLoadingOverlay('正在连接数据库...');
  try {
    // Load members
    const mRows = await db.getMembers();
    if (mRows.length > 0) {
      members = mRows.map(rowToMember);
    } else {
      // First run: seed members to DB (don't send local id)
      showLoadingOverlay('初始化团员数据...');
      for (const m of members) {
        const res = await db.upsertMember(m); // upsertMember checks db_id, none yet so will INSERT
        // db_id set inside upsertMember
      }
    }

    // Load events
    const evRows = await db.getEvents();
    if (evRows.length > 0) {
      events = evRows.map(rowToEvent);
      // Load logs for each event
      showLoadingOverlay('加载活动记录...');
      for (const ev of events) {
        const [dkpRows, lootRows] = await Promise.all([
          db.getDkpLogs(ev.db_id),
          db.getLootLogs(ev.db_id)
        ]);
        ev.dkpLog = dkpRows.map(rowToDkpLog);
        ev.lootLog = lootRows.map(rowToLootLog);
      }
    } else {
      // Seed existing events
      showLoadingOverlay('初始化活动数据...');
      for (const ev of events) {
        const res = await db.upsertEvent(ev);
        if (res) {
          ev.db_id = res.id;
          for (const log of ev.dkpLog) await db.insertDkpLog(ev.db_id, log);
          for (const log of ev.lootLog) await db.insertLootLog(ev.db_id, log);
        }
      }
    }

    // Load gear types
    const gRows = await db.getGearTypes();
    if (gRows.length > 0) {
      gearTypes = gRows.map(rowToGearType);
    }

    hideLoadingOverlay();
    const dbDot = document.getElementById('db-status');
    if (dbDot) { dbDot.style.background='#3a9a68'; dbDot.title='已连接数据库'; }
    initCal();
    renderMembers();
    renderDkp();
    if (typeof renderGear === 'function') renderGear();

  } catch(e) {
    console.error('DB load error:', e);
    hideLoadingOverlay();
    toast('数据库连接失败，使用本地数据', 'err');
    initCal();
  }
}

function showLoadingOverlay(msg) {
  let el = document.getElementById('db-loading');
  if (!el) {
    el = document.createElement('div');
    el.id = 'db-loading';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(5,8,15,.96);z-index:8999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px';
    el.innerHTML = `<div style="width:48px;height:48px;border:3px solid rgba(200,168,75,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite"></div><div id="db-loading-msg" style="color:var(--gold);font-size:14px;letter-spacing:2px"></div>`;
    document.body.appendChild(el);
    const style = document.createElement('style');
    style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(style);
  }
  document.getElementById('db-loading-msg').textContent = msg;
}
function hideLoadingOverlay() {
  const el = document.getElementById('db-loading');
  if (el) el.remove();
}
